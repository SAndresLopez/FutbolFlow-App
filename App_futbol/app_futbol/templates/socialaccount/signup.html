<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro FutbolAPP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .registration-container {
            background: #1e1e1e;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 90%;
            border: 1px solid #333;
        }
        .form-control, .form-select {
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: white;
            padding: 0.75rem;
        }
        .form-control:focus, .form-select:focus {
            background-color: #333;
            color: white;
            border-color: #28a745;
            box-shadow: 0 0 0 0.25rem rgba(40, 167, 69, 0.25);
        }
        .form-control::placeholder {
            color: #888;
        }
        .btn-success {
            background-color: #28a745;
            border: none;
            padding: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-success:hover {
            background-color: #218838;
            transform: translateY(-2px);
        }
        h2 {
            font-weight: 800;
            color: #28a745;
        }
    </style>
</head>
<body>
    <div class="registration-container text-center">
        <h2 class="mb-2">FICHÁJE FINAL ⚽</h2>
        <p class="text-muted mb-4">Completa tu ficha para saltar a la cancha.</p>

        <form method="POST" action="/completar-perfil/">
            {% csrf_token %}

            <div class="mb-3">
                <input type="text" name="apodo" class="form-control" placeholder="TU APODO (Ej: El Mago)" required>
            </div>

            <div class="mb-3">
                <input type="tel" name="telefono" class="form-control" placeholder="WHATSAPP" required>
            </div>

            <div class="mb-3">
                <select name="posicion" class="form-select" required>
                    <option value="" disabled selected>TU POSICIÓN</option>
                    <option value="Arquero">Arquero</option>
                    <option value="Defensa">Defensa</option>
                    <option value="Mediocampista">Mediocampista</option>
                    <option value="Delantero">Delantero</option>
                </select>
            </div>

            <div class="mb-3">
                <select name="distrito" class="form-select" required>
                    <option value="" disabled selected>TU DISTRITO</option>
                    <option value="San Borja">San Borja</option>
                    <option value="Surco">Surco</option>
                    <option value="Miraflores">Miraflores</option>
                    <option value="La Molina">La Molina</option>
                    <option value="Otros">Otros</option>
                </select>
            </div>

            <button type="submit" class="btn btn-success w-100 mt-2">¡SALTAR AL CAMPO!</button>
        </form>
    </div>
</body>
</html>
